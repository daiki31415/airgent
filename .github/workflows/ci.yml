name: CI

on:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest]
        bun-version: ['latest']
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: ${{ matrix.bun-version }}

      - name: Environment debug
        run: |
          uname -a
          bun --version
          which xzcat || true
          which bzcat || true
          which lzcat || true
          echo $SHELL

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Run lint
        run: bun run lint

      - name: Run typecheck
        run: bun run typecheck

      - name: Run setup stubs
        run: node scripts/setup-test-stubs.mjs

      - name: Run tests
        run: bun test --isolate 2>&1 || (bun test --isolate --reporter=junit > /tmp/results.xml 2>&1; cat /tmp/results.xml; exit 1)